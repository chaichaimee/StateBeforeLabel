summary = "Състояние преди етикета"
description = """Обявява състоянията на контролите (отметнато, натиснато, разгърнато, недостъпно, избрано, само за четене) преди името на обекта, така че потребителите първо да чуят състоянието. Всеки тип състояние може да се превключва индивидуално в панела с настройки на NVDA за състояние преди етикета."""