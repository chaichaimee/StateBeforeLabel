summary = "Trạng thái trước nhãn"
description = """Thông báo các trạng thái điều khiển (đã chọn, đã nhấn, đã mở rộng, không khả dụng, đã chọn, chỉ đọc) trước tên đối tượng để người dùng nghe thấy trạng thái trước. Mỗi loại trạng thái có thể được bật/tắt riêng lẻ trong bảng cài đặt "Trạng thái trước nhãn" của NVDA."""