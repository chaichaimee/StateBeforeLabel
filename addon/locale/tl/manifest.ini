summary = "Estado bago ang label"
description = """Inanunsyo ang mga estado ng control (naka-check, pinindot, pinalawak, hindi available, napili, read-only) bago ang pangalan ng object para marinig muna ng mga user ang estado. Ang bawat uri ng estado ay maaaring i-toggle nang paisa-isa sa panel ng mga setting ng "Estado bago ang label" ng NVDA."""