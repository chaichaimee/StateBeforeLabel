summary = "Zustand vor Bezeichnung"
description = """Kündigt Steuerelementzustände (markiert, gedrückt, aufgeklappt, nicht verfügbar, ausgewählt, schreibgeschützt) vor dem Objektnamen an, sodass Benutzer den Zustand zuerst hören. Jeder Zustandstyp kann im NVDA-Einstellungsbereich „Zustand vor Bezeichnung“ individuell umgeschaltet werden."""