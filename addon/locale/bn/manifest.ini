summary = "লেবেলের আগে অবস্থা"
description = """অবজেক্টের নামের আগে কন্ট্রোল স্টেটগুলো (চেক করা, প্রেস করা, প্রসারিত, অনুপলব্ধ, নির্বাচিত, শুধুমাত্র পঠনযোগ্য) ঘোষণা করে যাতে ব্যবহারকারীরা প্রথমে স্টেটটি শুনতে পান। NVDA-এর "লেবেলের আগে অবস্থা" সেটিংস প্যানেলে প্রতিটি স্টেট আলাদাভাবে টগল করা যেতে পারে।"""