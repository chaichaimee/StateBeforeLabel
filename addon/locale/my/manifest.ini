summary = "တံဆိပ်မတပ်မီ အခြေအနေ"
description = """အသုံးပြုသူများ ဦးစွာကြားရစေရန် ထိန်းချုပ်မှုအခြေအနေများ (အမှန်ခြစ်ထားသော၊ နှိပ်ထားသော၊ ချဲ့ထားသော၊ မရနိုင်သော၊ ရွေးချယ်ထားသော၊ ဖတ်ရန်သာ) ကို အရာဝတ္ထုအမည်မတိုင်မီ ကြေညာပေးသည်။ အခြေအနေအမျိုးအစားတစ်ခုစီကို NVDA ၏ "တံဆိပ်မတပ်မီ အခြေအနေ" ဆက်တင်များတွင် တစ်ခုချင်းစီ ပြောင်းလဲနိုင်ပါသည်။"""