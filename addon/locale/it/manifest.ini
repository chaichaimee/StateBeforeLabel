summary = "Stato prima dell'etichetta"
description = """Annuncia gli stati dei controlli (selezionato, premuto, espanso, non disponibile, selezionato, sola lettura) prima del nome dell'oggetto, in modo che gli utenti sentano prima lo stato. Ogni tipo di stato può essere attivato individualmente nel pannello delle impostazioni "Stato prima dell'etichetta" di NVDA."""