summary = "Белгіге дейінгі күй"
description = """Пайдаланушылар күйді алдымен естуі үшін басқару элементтерінің күйлерін (белгіленген, басылған, жайылған, қолжетімсіз, таңдалған, тек оқу үшін) нысан атауының алдында жариялайды. Әр күй түрін NVDA-ның "Белгіге дейінгі күй" параметрлер панелінде жеке қосуға/өшіруге болады."""