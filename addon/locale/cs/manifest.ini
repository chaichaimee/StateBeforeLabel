summary = "Stav před popiskem"
description = """Oznámí stavy ovládacích prvků (zaškrtnuto, stisknuto, rozbaleno, nedostupné, vybráno, jen ke čtení) před názvem objektu, takže uživatelé slyší stav jako první. Každý typ stavu lze individuálně přepínat v panelu nastavení "Stav před popiskem" v NVDA."""