summary = "Stav pred menovkou"
description = """Oznámi stavy ovládacích prvkov (zaškrtnuté, stlačené, rozbalené, nedostupné, vybraté, len na čítanie) pred názvom objektu, takže používatelia počujú stav ako prvý. Každý typ stavu možno individuálne prepínať na paneli nastavení "Stav pred menovkou" v NVDA."""