summary = "Állapot a felirat előtt"
description = """Bejelenti a vezérlőállapotokat (bejelölve, lenyomva, kibontva, nem elérhető, kijelölve, írásvédett) az objektum neve előtt, így a felhasználók először az állapotot hallják. Minden állapottípus külön-külön kapcsolható az NVDA "Állapot a felirat előtt" beállítási paneljén."""