summary = "ලේබලයට පෙර තත්ත්වය"
description = """පාලක තත්ත්වයන් (සලකුණු කළ, ඔබන ලද, දිගහැරුණු, ලබාගත නොහැකි, තෝරාගත්, කියවීමට පමණක්) ඔබ්ජෙක්ට් නාමයට පෙර ප්‍රකාශ කරන බැවින් පරිශීලකයින්ට මුලින්ම තත්ත්වය ඇසෙනු ඇත. සෑම තත්ත්ව වර්ගයක්ම NVDA හි "ලේබලයට පෙර තත්ත්වය" සැකසුම් පුවරුව තුළ වෙන වෙනම ටොගල් කළ හැක."""