summary = "లేబుల్‌కు ముందు స్థితి"
description = """కంట్రోల్ స్థితులను (సెలెక్ట్ చేయబడింది, నొక్కబడింది, విస్తరించబడింది, అందుబాటులో లేదు, ఎంచుకోబడింది, చదవడానికి మాత్రమే) ఆబ్జెక్ట్ పేరు కంటే ముందుగానే తెలియజేస్తుంది, దీనివల్ల వినియోగదారులు స్థితిని ముందుగా వినగలరు. ప్రతి స్థితిని NVDAలోని "లేబుల్‌కు ముందు స్థితి" సెట్టింగ్‌ల ప్యానెల్‌లో వ్యక్తిగతంగా మార్చుకోవచ్చు."""