summary = "Tilstand før etiket"
description = """Oplæser kontrolelementernes tilstande (markeret, trykket, udvidet, utilgængelig, valgt, skrivebeskyttet) før objektnavnet, så brugerne hører tilstanden først. Hver tilstandstype kan slås til eller fra individuelt i NVDA's indstillingspanel for "Tilstand før etiket"."""