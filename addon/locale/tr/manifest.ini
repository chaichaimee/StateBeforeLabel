summary = "Etiket öncesi durum"
description = """Kullanıcıların durumu önce duyması için denetim durumlarını (işaretli, basılı, genişletilmiş, kullanılamaz, seçili, salt okunur) nesne adından önce duyurur. Her durum türü, NVDA'nın "Etiket öncesi durum" ayarlar panelinden ayrı ayrı değiştirilebilir."""