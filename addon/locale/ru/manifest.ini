summary = "Состояние перед меткой"
description = """Озвучивает состояния элементов управления (отмечено, нажато, развернуто, недоступно, выбрано, только чтение) перед именем объекта, чтобы пользователи сначала слышали состояние. Каждый тип состояния можно отдельно переключать на панели настроек "Состояние перед меткой" в NVDA."""