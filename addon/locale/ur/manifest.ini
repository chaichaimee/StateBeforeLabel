summary = "لیبل سے پہلے اسٹیٹ"
description = """آبجیکٹ کے نام سے پہلے کنٹرول اسٹیٹس (چیکڈ، پریسڈ، ایکسپینڈڈ، ناقابل دستیاب، منتخب، صرف پڑھنے کے لیے) کا اعلان کرتا ہے تاکہ صارفین پہلے اسٹیٹ سن سکیں۔ ہر اسٹیٹ کی قسم کو NVDA کے "لیبل سے پہلے اسٹیٹ" سیٹنگز پینل میں انفرادی طور پر ٹوگل کیا جا سکتا ہے۔"""