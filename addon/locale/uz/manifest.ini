summary = "Yorliqdan oldingi holat"
description = """Foydalanuvchilar holatni birinchi bo'lib eshitishlari uchun boshqaruv holatlarini (belgilangan, bosilgan, kengaytirilgan, mavjud emas, tanlangan, faqat o'qish uchun) ob'ekt nomidan oldin e'lon qiladi. Har bir holat turini NVDA'ning "Yorliqdan oldingi holat" sozlamalar panelida alohida yoqish yoki o'chirish mumkin."""