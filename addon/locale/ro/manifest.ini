summary = "Starea înainte de etichetă"
description = """Anunță stările controlului (bifat, apăsat, extins, indisponibil, selectat, doar citire) înainte de numele obiectului, astfel încât utilizatorii să audă starea mai întâi. Fiecare tip de stare poate fi comutat individual în panoul de setări "Starea înainte de etichetă" din NVDA."""