summary = "Стан перед міткою"
description = """Озвучує стани елементів керування (відмічено, натиснуто, розгорнуто, недоступно, вибрано, тільки для читання) перед назвою об'єкта, щоб користувачі спочатку чули стан. Кожен тип стану можна індивідуально перемикати на панелі налаштувань "Стан перед міткою" в NVDA."""